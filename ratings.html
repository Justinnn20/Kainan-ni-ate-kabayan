<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kainan ni Ate Kabayan - Ratings</title>
    <link rel="stylesheet" href="ratings.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="header-container">
        <div class="logo">
            <div class="logo-circle">
                <img src="images/logo ate kabayan.jpg" alt="Logo">
            </div>
            <h2>KAINAN NI ATE KABAYAN</h2>
        </div>
        
        <nav>
            <a href="homepage.html" class="active">Home</a>
            <a href="menu.html">Menu</a>
            <a href="About Us.html">About Us</a>
            <a href="Contactus.html">Contact Us</a>
        </nav>

        <div class="header-actions">
            <a href="cart.html" class="cart-icon-btn">
                <i class="fa-solid fa-shopping-cart"></i>
                <span class="badge" id="cart-badge">0</span>
            </a>
            <button class="btn-order-now">Order Now!</button>
        </div>
    </div>
</header>

    <main>
        <div class="glass-card">
            <div class="card-header">
                <h2>RATINGS AND REVIEW</h2>
                <div class="user-interaction">
                    <div class="stars-input" id="starInput">
                        <i class="fa-regular fa-star" data-value="1"></i>
                        <i class="fa-regular fa-star" data-value="2"></i>
                        <i class="fa-regular fa-star" data-value="3"></i>
                        <i class="fa-regular fa-star" data-value="4"></i>
                        <i class="fa-regular fa-star" data-value="5"></i>
                    </div>
                    <button class="btn-review" onclick="openReviewModal()">Write Review</button>
                </div>
            </div>

            <div class="ratings-display">
                <div class="rating-score">
                    <span id="averageScore">0.0</span>
                    <div class="total-reviews" id="totalReviews">0 reviews</div>
                </div>

                <div class="rating-breakdown">
                    <div class="row">
                        <span>5</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-5" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div class="row">
                        <span>4</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-4" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div class="row">
                        <span>3</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-3" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div class="row">
                        <span>2</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-2" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div class="row">
                        <span>1</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="bar-1" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-left">
            <img src="logo-placeholder.png" alt="Logo" class="footer-logo">
            <div class="footer-info">
                <p><i class="fa-solid fa-door-open"></i> OPEN DAILY (10AM - 3AM)</p>
                <p><i class="fa-solid fa-phone"></i> (0921) 910 6637</p>
                <p><i class="fa-solid fa-location-dot"></i> 1785 Evangelista St. Bangkal, Makati City</p>
            </div>
        </div>
        <div class="footer-links">
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">Cart</a>
            <a href="#">Reserve a Table</a>
        </div>
        <div class="footer-socials">
            <h3>SOCIAL MEDIA</h3>
            <p><i class="fa-brands fa-facebook"></i> Kainan ni Ate Kabayan</p>
            <p><i class="fa-brands fa-instagram"></i> @kainan_ni_ate_kabayan</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
