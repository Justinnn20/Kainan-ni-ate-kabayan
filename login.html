<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kabayan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="left-panel">
            <div class="brand-top">
                <img src="logo.png" alt="Logo" class="logo">
            </div>
            <div class="brand-content">
                <h1 class="brand-text">Tara<br>Kain<br>Kabayan <span class="bowl-icon">🥣</span></h1>
            </div>
            <div class="social-icons-bottom">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-google"></i>
            </div>
        </div>

        <div class="right-panel">
            <div class="overlay">
                <div class="login-form-box">
                    <div class="login-header">
                        <div class="login-icon">
                            <i class="fas fa-sign-in-alt"></i>
                        </div>
                        <h2>Login</h2>
                        <p class="welcome-text">Welcome Kabayan! Craving for our delicious dishes? <br> Log in to order now!</p>
                    </div>

                    <form action="login.php" method="POST" class="login-form">
                        <div class="input-field">
                            <i class="far fa-user"></i>
                            <input type="email" name="email" placeholder="Email" required>
                        </div>
                        <div class="input-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" name="password" placeholder="Password" required>
                        </div>

                        <div class="form-options">
                            <label><input type="checkbox"> Remember me!</label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>

                        <button type="submit" name="login_btn" class="btn-login">Login</button>
                    </form>

                    <div class="signup-divider">
                        <span>Don't have an account?</span>
                    </div>

                    <div class="social-login">
                        <button class="btn-alt google"><i class="fab fa-google"></i> Google</button>
                        <button class="btn-alt facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
