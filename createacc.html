<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kabayan Member</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="createacc.css">
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <div class="overlay">
                <div class="content">
                    <p class="subtitle">COME IN</p>
                    <h1 class="main-title">WE ARE OPEN</h1>
                    <div class="divider-line"></div>
                    <p class="time">10:00 AM TO 3:00 AM</p>
                    <p class="address">1785 Evangelista St. near Malvar St.<br>Bangkal, Makati</p>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="form-wrapper">
                <div class="header-logo">
                    <div class="logo-circle">
                        <img src="logo.png" alt="" style="width: 100%; border-radius: 50%;">
                    </div>
                    <h2 class="form-heading">Create an Account</h2>
                    <p class="form-subheading">Become a Kabayan Member!</p>
                    <p class="form-text">Sign up now for faster checkout and exclusive treats!</p>
                </div>

                <form action="register.php" method="POST" class="register-form">
                    <div class="input-row">
                        <input type="text" name="full_name" placeholder="Name" required>
                        <input type="text" name="contact" placeholder="Contact Number">
                    </div>
                    
                    <div class="input-group">
                        <input type="email" name="email" placeholder="Email" required>
                    </div>

                    <div class="input-group password-field">
                        <input type="password" name="password" placeholder="Create your Password" required>
                        <i class="far fa-eye toggle-eye"></i>
                    </div>

                    <div class="input-group password-field">
                        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                        <i class="far fa-eye toggle-eye"></i>
                    </div>

                    <button type="submit" name="submit" class="btn-submit">Create Account</button>
                </form>

                <div class="or-divider">
                    <span>Or Register with</span>
                </div>

                <div class="social-login">
                    <button class="btn-social google"><i class="fab fa-google"></i> Google</button>
                    <button class="btn-social facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>

                <p class="footer-login">Already have an account? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </div>

</body>
</html>
